syntax = "proto3";

package plan;

option go_package = "/shared/plan";

// import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

//
service PlanService {
    // plan_name, user_id -> exists, plan_id
    rpc PlanExistsReturnId(SendPlanName) returns (PlanExistsResp) {};
    // plan_name, user_id -> exits, plan_id, exercise_ids
    rpc PlanExistsReturnPlan(SendPlanName) returns (PlanExistsReturnPlanResp) {};
    // user_id -> empty_plan_id
    rpc GetEmptyPlanId(SendUserID) returns (EmptyPlanIdResp) {};
    // user_id -> msg
    rpc CreateEmptyPlan(SendUserID) returns (CreateEmptyPlanResp) {}; 
    // {} -> msg
    rpc CheckHealth(CheckHealthReq) returns (CheckHealthResp) {}; 
    // user_id, plan_name, exercises_names -> msg, plan_name, exercises_name
    rpc CreatePlan(CreatePlanReq) returns (CreatePlanResp) {};
    // user_id -> number_of_plans, [{plan_name, exercise_names}]
    rpc GetAllPlans(GetAllPlansReq) returns (GetAllPlansResp) {};
    // user_id, plan_name -> plan_name, exercise_names
    rpc GetPlanByName(GetPlanByNameReq) returns (PlanResp) {};
    // user_id, plan_name, exercise_names -> plan_names, exercise_names
    rpc AddExercisesToPlan(PlanReq) returns (PlanResp) {};
    // user_id, plan_name, exercise_names -> plan_names, exercise_names
    rpc DeleteExercisesFromPlan(PlanReq) returns (PlanResp) {};
    // user_id, plan_name -> {}
    rpc DeletePlan(DeletePlanReq) returns (DeletePlanResp) {};
//
    rpc PING(PingPlanReq) returns (PingPlanResp) {};
    //
    rpc GetHealth(GetHealthReq) returns (GetHealthResp) {};
}

message GetHealthReq {}

message GetHealthResp {
    string service_name = 1;
    string status = 2;
    google.protobuf.Duration postgres_resp_time = 3;
    google.protobuf.Duration redis_resp_time = 4;    
}

message PingPlanReq {}

message PingPlanResp {}


message DeletePlanReq {
    string user_id = 1;
    string plan_name = 2;
}

message DeletePlanResp {}

message PlanReq{
    string user_id = 1;
    string plan_name = 2;
    repeated string exercise_names = 3;
}


message GetPlanByNameReq{
    string user_id = 1;
    string plan_name = 2;
}



message GetAllPlansReq {
    string user_id = 1;
}
message GetAllPlansResp {
    int64 number_of_plans = 1;
    repeated PlanResp all_plans = 2;
}

message PlanResp {
    string plan_name = 1;
    repeated string exercise_names = 2;
}

message CreatePlanReq {
    string user_id = 1;
    string plan_name = 2;
    repeated string exercise_names = 3;
}
message CreatePlanResp {
    string message = 1;
    string plan_name = 2;
    repeated string exercise_names = 3;
}


//
message CheckHealthReq {}


//
message CheckHealthResp {
    string message = 1;  
}

//
message SendUserID {
    // 
    string user_id = 1;
}

message CreateEmptyPlanResp {
    string message = 1;
}

message EmptyPlanIdResp {
    string empty_plan_id = 1;
}
//
message SendPlanName {
    //
    string user_id = 1;
    string plan_name = 2;
  
}
//
message PlanExistsResp {
    bool exists = 1;
    int64 plan_id = 2;  
}

//
message PlanExistsReturnPlanResp {
    //
    bool exists = 1;
    //
    string plan_id = 2;
    //
    repeated string exercise_ids = 3;
}


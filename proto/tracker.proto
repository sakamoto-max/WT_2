syntax = "proto3";

package tracker;

option go_package = "shared/tracker";
// import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
// import "auth.proto";

//
service TrackerService {
    //
    rpc StartEmptyWorkout(StartEmptyWorkoutReq) returns (GeneralResp) {};
    //
    rpc StartWorkoutWithPlan(StartWorkoutWithPlanReq) returns (StartWorkoutWithPlanResp) {};
    //
    rpc EndWorkout(EndWorkoutReq) returns (EndWorkoutResp) {};
//
    rpc PING(PingTrackReq) returns (PingTrackResp) {};
    //
    rpc GetHealth(GetHealthReq) returns (GetHealthResp) {};
}

message GetHealthReq {}

message GetHealthResp {
    string service_name = 1;
    string status = 2;
    google.protobuf.Duration postgres_resp_time = 3;
    google.protobuf.Duration redis_resp_time = 4;    
}

message PingTrackReq {}

message PingTrackResp{}

message EndWorkoutReq {
    int64 user_id = 1;
  repeated TrackerForEachExer all_exerices = 2;
}

message TrackerForEachExer {
    int64 exercise_id = 1;
    repeated SetsAndReps sets_and_reps = 2;
}

message SetsAndReps {
    int64 weight = 1;
    int64 reps = 2; 
}


message EndWorkoutResp {
    string message = 1;
}


message StartWorkoutWithPlanReq {
    int64 user_id = 1;
    string plan_name = 2;
}
message StartWorkoutWithPlanResp {
    string message = 1;
    string plan_name = 2;
    repeated string exercises_in_plan = 3;
}

message StartEmptyWorkoutReq {
    int64 user_id = 1;
}

message GeneralResp {
    string message = 1;
}



